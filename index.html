<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUTIQUE BY FRANKLIN</title>
    <style>
        /* Design Orange & Noir Premium - Franklin Edition */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-orange: #ff6600;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --hover-shadow: rgba(255, 102, 0, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* En-tête */
        header {
            background-color: #000;
            color: var(--primary-orange);
            padding: 25px 0;
            text-align: center;
            border-bottom: 2px solid var(--primary-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0;
            font-size: 2.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* Barre de navigation / Filtres */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 40px auto;
            max-width: 90%;
            padding: 10px;
        }
        button {
            padding: 12px 28px;
            border: 2px solid var(--primary-orange);
            border-radius: 30px;
            background-color: transparent;
            color: var(--primary-orange);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        button:hover, button.active {
            background-color: var(--primary-orange);
            color: #000;
            box-shadow: 0 0 15px var(--primary-orange);
        }

        /* Grille des boutiques */
        #shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 50px auto;
            padding: 20px;
            flex-grow: 1;
        }

        /* Carte de boutique */
        .shop-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        .shop-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px var(--hover-shadow);
            border-color: var(--primary-orange);
        }

        /* Conteneur du Logo */
        .shop-logo-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden;
            background-color: #ffffff; /* Fond blanc pour faire ressortir les logos */
            border: 2px solid #333;
            transition: border-color 0.3s ease;
            padding: 10px; /* Petit espace intérieur */
        }
        .shop-card:hover .shop-logo-container {
            border-color: var(--primary-orange);
        }

        /* L'image du logo */
        .shop-logo-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* S'assure que le logo n'est pas coupé */
            display: block;
        }

        .shop-card h3 {
            color: #fff;
            margin: 10px 0;
            font-size: 1.4em;
            font-weight: 700;
        }

        .category-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 6px 15px;
            background-color: #2a2a2a;
            color: var(--primary-orange);
            border: 1px solid var(--primary-orange);
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .shop-card:hover .category-badge {
             background-color: var(--primary-orange);
             color: #000;
        }

        /* Fenêtre Modal (Pop-up de Détails) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--card-bg);
            color: var(--text-main);
            margin: 8% auto;
            padding: 40px;
            border: 2px solid var(--primary-orange);
            border-radius: 20px;
            width: 85%;
            max-width: 650px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            text-align: center;
        }
        .close-modal {
            color: var(--primary-orange);
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .close-modal:hover {
            transform: scale(1.2);
            color: #fff;
        }

        /* Mise en page interne du Modal */
        #modal-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        #modal-body h2 {
            color: var(--primary-orange);
            margin-bottom: 5px;
            font-size: 2.2em;
        }
        .modal-shop-details {
            text-align: left;
            max-width: 90%;
            margin: 0 auto;
            background-color: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .modal-detail-line {
            font-size: 1.1em;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 8px;
        }
        .modal-detail-line strong {
            color: #fff;
        }
        .modal-detail-line span {
            color: var(--text-muted);
        }

    </style>
</head>
<body>

    <header>
        <h1>BOUTIQUE BY FRANKLIN</h1>
    </header>

    <div class="filters">
        <button class="active" onclick="filterShops('TOUT')">TOUT</button>
        <button onclick="filterShops('LUXE')">LUXE</button>
        <button onclick="filterShops('TECH')">TECH</button>
        <button onclick="filterShops('MODE')">MODE</button>
        <button onclick="filterShops('SPORT')">SPORT</button>
        <button onclick="filterShops('BEAUTE')">BEAUTÉ</button>
        <button onclick="filterShops('MAISON')">MAISON</button>
        <button onclick="filterShops('AUTO')">AUTO</button>
        <button onclick="filterShops('DIVERS')">DIVERS</button>
    </div>

    <div id="shop-container"></div>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script>
        // La base de données contient maintenant le "domain" (site web) pour tirer le logo automatiquement
        const shops = [
            { id: 1, name: "ZARA", domain: "zara.com", category: "MODE", delay: "3 jours", account: "Non requis", return: "Possible" },
            { id: 2, name: "Apple", domain: "apple.com", category: "TECH", delay: "Immédiat", account: "Requis (historique d'achat)", return: "Possible" },
            { id: 3, name: "Sephora", domain: "sephora.fr", category: "BEAUTE", delay: "2 jours", account: "Non requis", return: "Possible" },
            { id: 4, name: "Rolex", domain: "rolex.com", category: "LUXE", delay: "Sur commande", account: "Oui (profil VIP)", return: "Non possible" },
            { id: 5, name: "Decathlon", domain: "decathlon.fr", category: "SPORT", delay: "1 jour", account: "Non requis", return: "Possible" },
            { id: 6, name: "Ikea", domain: "ikea.com", category: "MAISON", delay: "4 jours", account: "Non requis", return: "Possible" },
            { id: 7, name: "Boulanger", domain: "boulanger.com", category: "TECH", delay: "2 jours", account: "Non requis", return: "Possible" },
            { id: 8, name: "Norauto", domain: "norauto.fr", category: "AUTO", delay: "3 jours", account: "Non requis", return: "Possible" },
            { id: 9, name: "Fnac", domain: "fnac.com", category: "DIVERS", delay: "Immédiat", account: "Non requis", return: "Possible" },
            { id: 10, name: "Louis Vuitton", domain: "louisvuitton.com", category: "LUXE", delay: "Sur commande", account: "Oui (historique requis)", return: "Non possible" },
            { id: 11, name: "Nike", domain: "nike.com", category: "SPORT", delay: "2 jours", account: "Oui (compte membre)", return: "Possible" }
        ];

        // Fonction pour afficher les boutiques
        function renderShops(shopList) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; 

            shopList.sort((a, b) => a.name.localeCompare(b.name));

            shopList.forEach(shop => {
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.onclick = () => openModal(shop.id);

                // On utilise Clearbit Logo API pour tirer l'image automatiquement grâce au nom de domaine
                card.innerHTML = `
                    <div class="shop-logo-container">
                         <img src="https://logo.clearbit.com/${shop.domain}" alt="Logo ${shop.name}" class="shop-logo-image" onerror="this.src='https://via.placeholder.com/120?text=${shop.name}'">
                    </div>
                    <h3>${shop.name}</h3>
                    <span class="category-badge">${shop.category}</span>
                `;
                container.appendChild(card);
            });
        }

        // Fonction pour filtrer
        function filterShops(category) {
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'TOUT') {
                renderShops(shops);
            } else {
                const filtered = shops.filter(shop => shop.category === category);
                renderShops(filtered);
            }
        }

        // Fonctions pour gérer le Pop-up
        const modal = document.getElementById("shopModal");

        function openModal(shopId) {
            const shop = shops.find(s => s.id === shopId);
            const modalBody = document.getElementById("modal-body");

            modalBody.innerHTML = `
                <div id="modal-header">
                     <div class="shop-logo-container" style="width: 100px; height: 100px; padding: 5px;">
                         <img src="https://logo.clearbit.com/${shop.domain}" alt="Logo ${shop.name}" class="shop-logo-image" onerror="this.src='https://via.placeholder.com/100?text=${shop.name}'">
                    </div>
                    <h2>${shop.name}</h2>
                    <span class="category-badge" style="margin-top: 5px;">${shop.category}</span>
                </div>
                
                <div class="modal-shop-details">
                    <div class="modal-detail-line"><strong>Délai :</strong> <span>${shop.delay}</span></div>
                    <div class="modal-detail-line"><strong>Compte :</strong> <span>${shop.account}</span></div>
                    <div class="modal-detail-line"><strong>Retour :</strong> <span>${shop.return}</span></div>
                </div>
            `;
            modal.style.display = "block";
        }

        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        // Affichage initial
        renderShops(shops);
    </script>
</body>
</html>
